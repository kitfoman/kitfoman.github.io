<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ካናዳ</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root{
    --bg:#0b0b10; --panel:#101018; --ink:#c8ffd4; --dim:#5a6a5e;
    --accent:#ffb347; --err:#ff5566;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);
    font-family:"SF Mono",Menlo,Consolas,monospace;font-size:13px;overflow:hidden}
  #bar{display:flex;align-items:center;gap:10px;height:44px;padding:0 12px;
    background:var(--panel);border-bottom:1px solid #1d1d2a}
  #bar .title{color:var(--accent);font-weight:bold;letter-spacing:1px}
  .ibtn{width:34px;height:30px;display:flex;align-items:center;justify-content:center;
    background:#1a1a26;color:var(--ink);border:1px solid #2a2a3a;border-radius:6px;
    cursor:pointer;font:inherit;font-size:15px;line-height:1;user-select:none}
  .ibtn:hover,.ibtn.on{border-color:var(--accent);color:var(--accent)}
  .ibtn svg{display:block;pointer-events:none}
  #file{display:none}
  #track{color:var(--dim);max-width:240px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap}
  .meter{width:54px;height:8px;background:#1a1a26;border-radius:4px;overflow:hidden}
  .meter i{display:block;height:100%;width:0%}
  #mB i{background:#ff7043}#mM i{background:#ffd54f}#mT i{background:#4dd0e1}
  #wrap{display:flex;height:calc(100% - 44px);position:relative}
  #left{position:absolute;top:0;left:0;bottom:0;width:46%;min-width:300px;
    display:flex;flex-direction:column;z-index:4;
    background:rgba(10,10,16,.52);backdrop-filter:blur(2px);
    border-right:1px solid rgba(50,50,75,.5)}
  #code{flex:1;width:100%;resize:none;border:0;outline:none;padding:12px;
    background:transparent;color:var(--ink);font:inherit;line-height:1.45;
    tab-size:2;white-space:pre;overflow:auto}
  #log{max-height:30%;overflow:auto;padding:8px 12px;border-top:1px solid #1d1d2a;
    background:rgba(0,0,0,.45);color:var(--err);white-space:pre-wrap;display:none}
  #log.ok{color:#6ee07a;display:block}
  #log.bad{display:block}
  #right{flex:1;position:relative;background:#000}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #hint{position:absolute;left:12px;bottom:10px;color:#888;font-size:11px;
    text-shadow:0 1px 2px #000;pointer-events:none}
  .hidden{display:none!important}
  #cv{filter:grayscale(1) brightness(.5);transition:filter 1.2s ease}
  body.started #cv{filter:none}
  #go{position:absolute;inset:0;z-index:6;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;cursor:pointer;
    background:radial-gradient(ellipse at center,rgba(0,0,0,.15),rgba(0,0,0,.7));
    transition:opacity .7s ease}
  #go h1{color:#f3f3ee;font-size:54px;letter-spacing:10px;font-weight:normal;
    text-shadow:0 0 28px rgba(255,179,71,.55)}
  #go .ring{width:92px;height:92px;border:2px solid var(--accent);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:32px;color:var(--accent);padding-left:6px;
    text-shadow:0 0 18px rgba(255,179,71,.9);
    box-shadow:0 0 36px rgba(255,179,71,.25),inset 0 0 18px rgba(255,179,71,.15)}
  #go p{color:#bba;letter-spacing:4px;font-size:12px;
    animation:blink 1.5s steps(1) infinite}
  @keyframes blink{50%{opacity:.2}}
  body.started #go{opacity:0;pointer-events:none}
  .CodeMirror{flex:1;height:auto;color:var(--ink);
    font:13px "SF Mono",Menlo,Consolas,monospace;line-height:1.45;
    background:transparent!important}
  .CodeMirror-gutters{background:rgba(10,10,16,.35)!important;
    border-right:1px solid rgba(50,50,75,.4)!important}
</style>
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
</head>
<body>

<div id="bar">
  <span class="title">ካናዳ</span>
  <label class="ibtn" for="file" title="Load MP3"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="12.5" r="2.3"/><rect x="6.2" y="2.6" width="1.3" height="10"/><path d="M7.5 2.6c2.8.5 4.3 1.8 4.3 4.1-1.1-1.2-2.5-1.7-4.3-1.8z"/></svg></label>
  <input id="file" type="file" accept="audio/*">
  <button id="mute" class="ibtn" title="Mute / unmute"></button>
  <span id="track">no track loaded</span>
  <span class="meter" id="mB"><i></i></span>
  <span class="meter" id="mM"><i></i></span>
  <span class="meter" id="mT"><i></i></span>
  <button id="toggle" class="ibtn" title="Show / hide code">&lt;/&gt;</button>
  <button id="recompile" class="ibtn" title="Compile (Ctrl+Enter)"><svg width="13" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 1 3 9.2h3.8L5.6 15l6.9-8.6H8.6z"/></svg></button>
</div>

<div id="wrap">
  <div id="left" class="hidden">
    <textarea id="code" spellcheck="false"></textarea>
    <pre id="log"></pre>
  </div>
  <div id="right">
    <canvas id="cv"></canvas>
    <div id="hint">uniforms: time, resolution, sound, bass, mid, treb, spectrum (512x2)</div>
    <div id="go">
      <h1>ካናዳ</h1>
      <div class="ring">&#9654;</div>
      <p>CLICK TO PRESS PLAY</p>
    </div>
  </div>
</div>

<script id="fs" type="x-shader/x-fragment">precision highp float;
uniform vec2 resolution;
uniform float time;
uniform float sound;   // overall level 0..1
uniform float bass;    // ~40-250 Hz
uniform float mid;     // ~250-2000 Hz
uniform float treb;    // ~2-8 kHz
uniform float quality; // 1 = desktop (3-tap aberration), 0 = mobile fast path

float h21(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float n2(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.-2.*f);
  return mix(mix(h21(i),h21(i+vec2(1.,0.)),f.x),
             mix(h21(i+vec2(0.,1.)),h21(i+vec2(1.,1.)),f.x),f.y);
}
float fbm(vec2 p){
  float a=.5,r=0.;
  for(int i=0;i<4;i++){r+=a*n2(p);p=p*2.03+11.3;a*=.5;}
  return r;
}

vec3 scene(vec2 uv,float t){
  float asp=resolution.x/resolution.y;
  float horizon=.38;

  // smoggy sky: sodium orange sinking into dirty violet
  vec3 col=mix(vec3(.42,.22,.07),vec3(.07,.045,.10),smoothstep(horizon-.05,1.,uv.y));
  col+=.10*fbm(vec2(uv.x*asp*2.5+t*.015,uv.y*3.))*vec3(1.,.55,.25);
  col+=vec3(.45,.26,.08)*exp(-abs(uv.y-horizon)*9.)*.5;

  // red-eye out of LaGuardia
  vec2 pp=vec2(fract(t*.016)*1.3-.15,.82);
  col+=vec3(1.,.3,.2)*step(.6,fract(t*1.3))*.0015/(length((uv-pp)*vec2(asp,1.))+.01);

  bool street=uv.y<horizon;
  vec2 su=uv;
  if(street){
    float wob=(n2(vec2(uv.x*50.,uv.y*70.-t*1.5))-.5)*.03+(n2(uv*9.)-.5)*.02;
    su.y=2.*horizon-uv.y+wob;   // wet asphalt mirror
  }

  float pan=t*.012;
  vec3 skyc=col;

  // moon hanging in the smog
  {
    vec2 md=vec2(su.x*asp,su.y)-vec2(asp*.78,.83);
    float mr=length(md);
    float disc=smoothstep(.062,.057,mr);
    vec3 mc=vec3(.95,.92,.80)*(.82+.18*n2(md*60.+vec2(7.,3.)));
    col=mix(col,mc*.9,disc*.85);
    col+=vec3(.8,.68,.48)*.0015/(mr*mr+.004);
  }

  // brooklyn-style suspension bridge, glimpsed behind the skyline
  {
    float bx=su.x*asp+pan*.2+3.0;
    float T=1.7;
    float u=fract(bx/T);
    float deck=horizon+.075;
    float towH=.17;
    float y0=deck+towH;
    vec3 sil=mix(vec3(.022,.018,.03),skyc,.5);
    vec3 stone=mix(vec3(.105,.080,.055),skyc,.38);
    float yc=deck+.012+towH*pow(abs(2.*u-1.),2.);
    float txl=(u<.5?u:u-1.)*T;
    float atx=abs(txl);
    // masonry tower with twin gothic arches carved through
    if(atx<.055&&su.y>deck-.05&&su.y<y0+.035){
      float q=min(abs(txl+.026),abs(txl-.026))/.016;
      float yArch=deck+.085-.085*pow(min(q,1.),.7);
      bool open=q<1.&&su.y<yArch;
      if(!open)col=stone*(.8+.2*n2(vec2(bx*40.,su.y*40.)));
    }
    if(atx<.066&&abs(su.y-(y0+.018))<.011)col=stone;     // cornice cap
    // two flags over each tower: stars & stripes + ethiopian tricolor
    if(abs(txl+.022)<.0028&&su.y>y0+.029&&su.y<y0+.092)col=sil; // pole 1
    if(abs(txl-.022)<.0028&&su.y>y0+.029&&su.y<y0+.092)col=sil; // pole 2
    float fy=(su.y+.006*sin(txl*150.-t*5.)-(y0+.052))/.034;
    float fx1=(txl+.022)/.040;
    float fx2=(txl-.022)/.040;
    if(fy>0.&&fy<1.){
      if(fx1>0.&&fx1<1.){
        vec3 fc=mix(vec3(.55,.10,.12),vec3(.75,.72,.68),step(.5,fract(fy*6.5)));
        if(fx1<.42&&fy>.52){
          float str=step(.92,h21(floor(vec2(fx1*8.,fy*8.))));
          fc=mix(vec3(.10,.12,.42),vec3(.8,.8,.85),str);
        }
        col=mix(fc,skyc,.45);
      }
      if(fx2>0.&&fx2<1.){
        vec3 fc=vec3(.70,.12,.10);                // red
        if(fy>.333)fc=vec3(.92,.74,.10);          // yellow
        if(fy>.666)fc=vec3(.06,.42,.16);          // green
        vec2 ed=vec2((fx2-.5)*1.2,(fy-.5)*.85);
        if(length(ed)<.20)fc=vec3(.07,.16,.62);   // blue disc
        if(length(ed)<.07)fc=vec3(.95,.80,.15);   // star
        col=mix(fc,skyc,.45);
      }
    }
    // main cables
    if(abs(su.y-yc)<.0048&&su.y>deck)col=sil;
    // diagonal stays fanning down from the tower tops
    float stx=min(u,1.-u)*T;
    float f=(y0-su.y)/(stx+.002);
    float stay=smoothstep(.465,.5,abs(fract(f*3.5)-.5))
              *step(.35,f)*step(f,7.)*smoothstep(.50,.12,stx)
              *step(deck,su.y)*step(su.y,y0);
    col=mix(col,sil,stay*.55);
    // vertical suspenders
    if(abs(fract(bx*8.)-.5)<.035&&su.y>deck&&su.y<yc)col=mix(col,sil,.6);
    // deck + railing
    if(abs(su.y-deck)<.0065)col=sil;
    if(abs(su.y-(deck+.013))<.0018)col=mix(col,sil,.7);
    // necklace lights strung along the cable
    vec2 ld=vec2((fract(bx*8.)-.5)*.21,su.y-yc);
    col+=vec3(1.,.75,.45)*.000045/(dot(ld,ld)+.00009)*(1.+mid*.6);
    // traffic crossing the deck
    vec2 c1=vec2((fract(bx*.6-t*.05)-.5)*1.7,su.y-(deck+.009));
    vec2 c2=vec2((fract(bx*.6+t*.04+.37)-.5)*1.7,su.y-(deck+.009));
    col+=vec3(.9,.9,.75)*.00002/(dot(c1,c1)+.00005);
    col+=vec3(.9,.2,.12)*.000016/(dot(c2,c2)+.00005);
    // warm floodlight pooling at the tower bases
    col+=vec3(.5,.33,.12)*exp(-atx*30.)*exp(-abs(su.y-deck)*8.)*.25*step(atx,.2);
  }

  // twin towers downtown, rising behind the skyline
  {
    float q=mod(su.x*asp+pan*.45+2.6,5.5);
    float wtT=horizon+.42;
    vec3 sil=mix(vec3(.024,.02,.032),skyc,.48);
    float d1=abs(q-2.00);
    float d2=abs(q-2.27);
    if((d1<.10&&su.y<wtT)||(d2<.10&&su.y<wtT-.012)){
      col=sil;
      float st=fract(q*110.);
      col*=.78+.22*step(.45,st);
      float lit=step(.84,h21(vec2(floor(q*110.),floor(su.y*55.))));
      col+=vec3(.95,.75,.45)*lit*.30*step(.45,st)*step(su.y,wtT-.03);
    }
    if(d1<.005&&su.y>=wtT&&su.y<wtT+.07)col=sil;  // north tower antenna
    vec2 bd=vec2((q-2.00)*.8,(su.y-(wtT+.07))*1.1);
    col+=vec3(1.,.12,.08)*step(.5,fract(t*.8))*.00002/(dot(bd,bd)+.00005);
  }

  for(int l=0;l<3;l++){
    float fl=float(l);
    float sc=9.5-fl*2.8;
    float x=su.x*asp*sc+fl*23.7+pan*(.25+.45*fl)*sc;
    float id=floor(x);
    float fx=fract(x);
    float cx=abs(fx-.5);
    float rl=h21(vec2(id,fl+50.));
    float lm=step(.87,rl);                     // empire-state setback towers
    float ch=step(.80,rl)-lm;                  // chrysler-style crowns
    float top=horizon+.06+(.26+.16*fl)*h21(vec2(id,fl*9.+3.))+(lm+ch)*.10;
    if(su.y<top+.10){
      float haze=.62-.30*fl;
      float t01=clamp((su.y-horizon)/(top-horizon),0.,1.);
      float hw=.30+.18*h21(vec2(id,fl*3.+1.));
      if(lm>.5){ // setback tiers
        float tier=.30*step(.52,t01)+.25*step(.74,t01)+.18*step(.90,t01);
        hw=.42*(1.-tier);
      }
      if(ch>.5)hw=.40*(1.-.80*smoothstep(.50,1.,t01)); // tapering crown
      bool inside=(su.y<top&&cx<hw)||((lm+ch)>.5&&su.y<top+.055&&cx<.012);
      // rooftop water tank on some plain roofs
      float wt=step(.6,h21(vec2(id,fl+21.)))*(1.-lm-ch);
      float tx=fx-(.32+.30*h21(vec2(id,fl+22.)));
      if(wt>.5&&abs(tx)<.05&&su.y<top+.035&&cx<hw)inside=true;
      if(inside){
        vec3 b=mix(vec3(.022,.018,.030)+fl*.004,skyc,haze);
        // lit windows, a few of them flickering
        float rows=80.-fl*15.;
        vec2 w=vec2(fx*6.,su.y*rows);
        vec2 wi=floor(w)+vec2(id*13.1,fl*31.7);
        vec2 wf=fract(w);
        float lit=step(.60,h21(wi));
        float flick=1.;
        if(h21(wi+4.2)>.93)flick=step(.4,fract(t*(.4+2.*h21(wi+8.))+h21(wi)));
        float shape=step(.22,wf.x)*step(wf.x,.78)*step(.28,wf.y)*step(wf.y,.78);
        float edge=step(cx,hw-.06)*step(su.y,top-.02);
        vec3 wcol=mix(vec3(1.,.72,.32),vec3(.65,.8,1.),step(.86,h21(wi+2.3)));
        b+=wcol*lit*flick*shape*edge*(1.-haze)*.9;
        // knicks night: orange and blue floodlit crowns
        vec3 kc=mix(vec3(.96,.45,.10),vec3(.05,.35,.95),step(.80,t01));
        b+=kc*lm*smoothstep(.58,.78,t01)*(1.-haze)*(.42+bass*.25);
        // chrysler sunburst arcs
        float arc=step(fract(t01*9.),.40)*smoothstep(.58,.70,t01);
        b+=vec3(1.,.87,.55)*ch*arc*(1.-cx/max(hw,.02))*(1.-haze)*(.85+bass*.4);
        // buzzing bodega neon on the near block
        if(l==2&&lm<.5&&h21(vec2(id,77.))>.78){
          vec2 nd=vec2((fx-.5)*.7,(su.y-(top-.10))*2.4);
          float sd=length(nd);
          float buzz=.55+.45*smoothstep(.3,.7,n2(vec2(t*7.,id*4.3)))+mid*.5;
          vec3 ncol=h21(vec2(id,9.))>.5?vec3(1.,.15,.45):vec3(.15,1.,.55);
          b+=ncol*buzz*.0099/(sd*sd+.014);
        }
        col=b;
      }
      // blinking aircraft beacon on the mast
      if(lm+ch>.5){
        vec2 bd=vec2((fx-.5)*.6,(su.y-(top+.055))*1.1);
        float bln=step(.55,fract(t*.6+h21(vec2(id,2.))*3.));
        col+=vec3(1.,.12,.08)*bln*.00002/(dot(bd,bd)+.00005);
      }
    }
  }

  // choppers over the city
  for(int k=0;k<2;k++){
    float fk=float(k);
    float dir=fk*2.-1.;
    float hx=fract(t*(.022+.011*fk)+fk*.55)*(asp+.7)-.35;
    if(dir<0.)hx=asp-hx;
    float hy=.74+.06*fk+.02*sin(t*.8+fk*9.);
    vec2 hp=vec2(su.x*asp-hx,su.y-hy);
    // body silhouette + rotor strobe
    col=mix(col,vec3(.02,.02,.03),smoothstep(.012,.006,length(hp*vec2(1.,2.2))));
    float rot=smoothstep(.0035,.0015,abs(hp.y-.011))
             *smoothstep(.030,.012,abs(hp.x));
    col=mix(col,vec3(.035,.035,.045),rot*step(.5,fract(t*30.+fk)));
    // nav lights
    col+=vec3(1.,.1,.1)*step(.6,fract(t*1.7+fk*.4))*.00001/(dot(hp,hp)+.00002);
    vec2 gp=vec2(hp.x-.012*dir,hp.y);
    col+=vec3(.2,1.,.3)*step(.8,fract(t*1.1+fk*.7))*.000006/(dot(gp,gp)+.000015);
    // nypd searchlight sweeping the blocks below
    if(k==0&&su.y<hy){
      float dy=hy-su.y;
      float tilt=.35*sin(t*.43);
      float bw=.012+dy*.22;
      float cone=smoothstep(bw,bw*.2,abs(hp.x-dy*tilt))*exp(-dy*2.2)*(.35+bass*.3);
      col+=vec3(.9,.95,1.)*cone;
    }
  }

  // elevated track out front with a passing MTA train
  {
    float ex=su.x*asp+pan*2.4;
    float ely=horizon+.155;
    vec3 dark=vec3(.014,.012,.02);
    // support columns down to the street
    if(abs(fract(ex*2.2)-.5)<.028&&su.y<ely&&su.y>horizon-.005)col=mix(dark,col,.12);
    // track girder
    if(abs(su.y-ely)<.011)col=mix(dark,vec3(.05,.04,.05),step(.55,fract(ex*26.)));
    // the train itself, heading left, back every ~25s
    float p=4.5-mod(t*.42,10.5);
    float d=ex-p;
    if(d>0.&&d<1.3&&su.y>ely+.009&&su.y<ely+.064){
      float vsh=(su.y-ely-.009)/.055;
      col=vec3(.13,.14,.17);                              // brushed stainless
      col+=vec3(.15,.17,.21)*smoothstep(.5,.95,vsh);      // cool roofline sheen
      col+=vec3(.26,.17,.06)*smoothstep(.30,.05,abs(vsh-.20)); // sodium streak
      col*=.86+.14*sin(d*620.);                           // corrugated fluting
      float car=fract(d/.216);
      float gap=step(.035,car)*step(car,.965);
      if(su.y>ely+.030&&su.y<ely+.048){
        float wd=fract(d*37.);
        float win=step(.28,wd)*step(wd,.72)*gap;
        float fl2=.7+.3*step(.25,fract(t*11.+floor(d/.216)*.7));
        col=mix(col,vec3(.9,1.,1.15)*fl2,win);            // cool fluorescents
      }
      if(gap<.5)col=vec3(.03,.03,.04);                    // coupling shadow
      // MTA bullet on a couple of the cars
      vec2 m=vec2((car-.5)*.216,su.y-(ely+.0195))/.0088;
      float cid=floor(d/.216);
      if(dot(m,m)<1.&&gap>.5&&h21(vec2(cid,3.3))>.55){
        col=vec3(.04,.18,.60);                            // mta blue disc
        float bar=step(abs(abs(m.x)-.42),.13)*step(abs(m.y),.52);
        float vee=step(abs(m.y-(-.1+2.*abs(m.x))),.16)
                 *step(abs(m.x),.32)*step(m.y,.55);
        col=mix(col,vec3(.92,.95,1.),clamp(bar+vee,0.,1.)*.9);
      }
    }
    // bluish headlight + beam washing the rain ahead
    vec2 hd=vec2(d,(su.y-(ely+.033))*2.2);
    col+=vec3(.7,.85,1.)*.0002/(dot(hd,hd)+.00028)*step(d,.03)*step(-.4,d);
    float beam=exp(d*4.5)*step(d,0.)*step(-1.8,d);
    col+=vec3(.35,.55,1.)*beam*exp(-abs(su.y-(ely+.033))*20.)*(.3+bass*.25);
    // third-rail spark: bass hits make it arc more often
    float on=step(-1.4,p)*step(p,asp+.2);
    float fz=h21(vec2(floor(t*9.),7.));
    if(on*step(.93-bass*.12,fz)>.5){
      float sx=p+h21(vec2(floor(t*9.),3.))*1.2;
      vec2 sdv=vec2(ex-sx,(su.y-ely-.014)*1.4);
      col+=vec3(.55,.7,1.)*.0016/(dot(sdv,sdv)+.0016);
    }
  }

  if(street){
    float smear=.55+.45*n2(vec2(uv.x*160.,uv.y*5.));
    float depth=(horizon-uv.y)/horizon;
    col*=(.30+.25*smear)*(1.-.35*depth);
    col+=vec3(.06,.045,.03)*(1.-depth);
    // streetlight pools smeared down the wet pavement
    col+=vec3(.5,.35,.12)*pow(n2(vec2(uv.x*30.,2.)),3.)*exp(-depth*3.)*(.35+bass*.2);
    // matte asphalt roadbed at the bottom so traffic isn't on the water
    float roadT=.305;
    float road=smoothstep(roadT,roadT-.025,uv.y)*step(.115,uv.y);
    vec3 asph=vec3(.045,.042,.048)*(.75+.25*n2(uv*vec2(70.,30.)));
    asph+=vec3(.40,.27,.09)*pow(n2(vec2(uv.x*22.,5.)),3.)*.30;
    col=mix(col,asph,road*.85);
    // markings on the roadbed
    float ly=.205;
    float dbl=smoothstep(.0035,.0018,abs(abs(uv.y-ly)-.005));
    col=mix(col,vec3(.50,.37,.06),dbl*.6*road);
    float dash=step(.45,fract(uv.x*asp*6.+.3));
    float lne=smoothstep(.0035,.0018,abs(uv.y-.262));
    col=mix(col,vec3(.40,.40,.42),lne*dash*.5*road);
    // road edge against the wet avenue behind it
    col=mix(col,vec3(.09,.08,.08),smoothstep(.006,.002,abs(uv.y-roadT))*.6);
    // sidewalk + curb out front
    float walk=smoothstep(.120,.112,uv.y);
    vec3 side=vec3(.055,.050,.055)*(.7+.3*n2(uv*vec2(90.,40.)));
    side+=vec3(.40,.28,.10)*pow(n2(vec2(uv.x*25.,7.)),3.)*.5;
    col=mix(col,side,walk*.9);
    col=mix(col,vec3(.10,.09,.08),smoothstep(.0045,.0020,abs(uv.y-.121))*.8);
  }

  // street traffic: yellow cabs, the addis blue minibus, the anbessa bus
  for(int k=0;k<4;k++){
    float fk=float(k);
    bool farL=(k==0||k==2);
    float lane=farL?.245:.165;   // both lanes sit on the roadbed strip
    float sz=farL?.045:(k==1?.100:.115);
    float dir=farL?1.:-1.;
    float spd=farL?.10:.24;
    float wrap=asp+1.6;
    float ph=k<2?fk*2.3:.5*wrap+fk*1.1;
    float xp=mod(t*spd+ph,wrap)-.8;
    float sx=dir>0.?xp:asp-xp;
    vec2 q=vec2((uv.x*asp-sx)*dir,uv.y-lane)/sz;
    if(q.x>-.78&&q.x<.78&&q.y>-.08&&q.y<.46){
      // contact shadow pinning the vehicle to the road
      float shd=smoothstep(.68,.42,abs(q.x))*smoothstep(.07,.0,abs(q.y-.015));
      col=mix(col,col*.25,shd);
      if(k<2){
        // yellow cab
        float body=step(abs(q.x),.58)*step(.02,q.y)*step(q.y,.18);
        float cab=step(-.30,q.x)*step(q.x,.22)*step(.18,q.y)*step(q.y,.31);
        float wheel=step(length(vec2(abs(q.x)-.33,q.y-.04)),.085);
        if(wheel>0.)col=vec3(.02,.02,.025);
        if(body+cab>0.){
          vec3 yel=vec3(.95,.66,.06)*(.5+.5*clamp(q.y/.31,0.,1.));
          if(cab>0.&&q.x>-.26&&q.x<.18&&q.y<.285)yel=vec3(.04,.04,.06);
          col=yel;
          if(body>0.&&q.y>.055&&q.y<.095&&fract(q.x*8.)>.5)col*=.25;
        }
        if(q.x>-.08&&q.x<.02&&q.y>.31&&q.y<.36)col=vec3(1.,.92,.6);
      }else if(k==2){
        // addis blue & white minibus
        float body=step(abs(q.x),.50)*step(.02,q.y)*step(q.y,.34);
        float wheel=step(length(vec2(abs(q.x)-.29,q.y-.04)),.080);
        if(wheel>0.)col=vec3(.02,.02,.025);
        if(body>0.){
          float sh=.45+.55*clamp(q.y/.34,0.,1.);
          col=(q.y<.16?vec3(.08,.26,.62):vec3(.90,.91,.93))*sh;
          if(q.y>.205&&q.y<.29&&q.x>-.44&&fract((q.x+.44)*5.)>.15)
            col=vec3(.04,.05,.08);                 // windows + windshield
        }
      }else{
        // anbessa city bus
        float body=step(abs(q.x),.62)*step(.02,q.y)*step(q.y,.40);
        float wheel=step(length(vec2(abs(q.x)-.38,q.y-.04)),.085);
        if(wheel>0.)col=vec3(.02,.02,.025);
        if(body>0.){
          float sh=.45+.55*clamp(q.y/.40,0.,1.);
          col=vec3(.62,.13,.07)*sh;                // anbessa red body
          if(q.y>.24)col=vec3(.85,.60,.12)*sh;     // yellow upper + roof
          if(q.y<.24&&(abs(q.x-.44)<.05||abs(q.x+.16)<.05))
            col=vec3(.85,.60,.12)*sh;              // yellow door panels
          if(q.y>.245&&q.y<.335&&abs(q.x)<.57&&fract((q.x+.57)*7.)>.18)
            col=vec3(.05,.06,.09);                 // window row
          if(q.x>.40&&q.x<.56&&q.y>.335&&q.y<.385)
            col=vec3(.9,.78,.45);                  // lit route sign
          // anbessa badge: yellow disc, ring lettering, leaping lion
          vec2 bq=(vec2(q.x,q.y)-vec2(.02,.150))/.062;
          float br=length(bq);
          if(br<1.){
            col=vec3(.90,.76,.28)*sh;
            float ang=atan(bq.y,bq.x);
            if(br>.72&&abs(sin(ang))>.5&&fract(ang*2.)>.45)
              col=vec3(.30,.07,.04)*sh;            // circular lettering
            vec2 lq=vec2(bq.x*1.1,bq.y*1.9+.15);
            float head=length(vec2((bq.x-.34)*1.6,(bq.y-.22)*2.6));
            if(br<.70&&(length(lq)<.55||head<.35))
              col=vec3(.42,.11,.05)*sh;            // lion
          }
        }
      }
    }
    // headlights, taillights, wet smear (shared)
    float fX=k==3?.66:.64;
    vec2 hb=q-vec2(fX,.09);
    col+=vec3(.95,.9,.7)*.0035/(dot(hb,hb)+.005);
    vec2 tb=q-vec2(.01-fX,.10);
    col+=vec3(1.,.12,.05)*.0016/(dot(tb,tb)+.003);
    vec3 tint=k<2?vec3(.55,.38,.05):(k==2?vec3(.30,.38,.60):vec3(.55,.35,.08));
    float und=smoothstep(.70,.0,abs(q.x))*exp(-max(-q.y,0.)*4.)*step(q.y,0.);
    col+=tint*und*.22;
  }

  // subway entrance on the corner
  {
    float X=uv.x*asp;
    // stairwell void with light coming up the steps
    if(X>.07&&X<.40&&uv.y<.13){
      col=vec3(.012,.010,.016);
      col+=vec3(.55,.40,.14)*exp(-uv.y*9.)*exp(-(X-.07)*4.);
    }
    // railing posts + top rail
    if(X>.05&&X<.42){
      if(uv.y<.155&&abs(fract(X*16.)-.5)>.38)col=vec3(.014,.012,.018);
      if(abs(uv.y-.158)<.009)col=vec3(.014,.012,.018);
    }
    // lamppost + green globe
    if(abs(X-.455)<.009&&uv.y<.345)col=vec3(.015,.013,.019);
    vec2 gq=vec2(X-.455,uv.y-.375);
    float gl=length(gq);
    col=mix(col,vec3(.12,.78,.28)*(1.15-gl*14.),smoothstep(.030,.025,gl));
    col+=vec3(.15,.9,.3)*.00045/(gl*gl+.001);
  }

  // rain: shimmers with the hi-end of the track
  vec2 r=uv*vec2(asp,1.);
  r.x+=uv.y*.14+t*.03;
  float rain=pow(n2(vec2(r.x*110.,r.y*3.5+t*9.)),9.);
  rain+=pow(n2(vec2(r.x*55.+7.7,r.y*2.2+t*6.)),9.)*.7;
  col+=rain*vec3(.38,.43,.50)*(.55+treb*.8);

  return col;
}

void main(){
  vec2 frag=gl_FragCoord.xy/resolution;
  vec2 c=frag-.5;
  vec2 uv=.5+c*(1.+.07*dot(c,c));   // crt bulge
  float t=time;

  // per-line vhs jitter
  float ln=floor(frag.y*resolution.y);
  uv.x+=(h21(vec2(ln,floor(t*15.)))-.5)*.0018;

  // roaming tracking tear
  float bandY=fract(t*.11)*1.2-.1;
  float tear=smoothstep(.03,.0,abs(frag.y-bandY))
            *step(.55,h21(vec2(floor(t*.45),2.)));
  uv.x+=tear*.04;

  // chromatic aberration, worse inside the tear
  // (one scene sample instead of three on the mobile fast path)
  float ca=.0022+tear*.01;
  vec3 col;
  if(quality>.5){
    col.r=scene(uv+vec2(ca,0.),t).r;
    col.g=scene(uv,t).g;
    col.b=scene(uv-vec2(ca,0.),t).b;
  }else{
    col=scene(uv,t);
  }

  // static inside the tear band
  col+=tear*(h21(vec2(frag.y*713.1,t*977.))-.5)*.45;

  // murky grade + lifted tape blacks
  col=pow(col,vec3(.92,.88,.98));
  col*=vec3(1.08,1.02,.88);
  col=col*.96+vec3(.012,.02,.017);

  // the whole city breathes with the low end
  col*=1.+bass*.10;

  // scanlines, brightness flicker, grain, vignette
  col*=.86+.14*sin(frag.y*resolution.y*3.14159);
  col*=.97+.03*h21(vec2(floor(t*24.),1.));
  col+=(h21(frag*resolution.xy+fract(t)*941.)-.5)*.085;
  col*=1.-.85*dot(c,c);

  // REC dot
  float rd=length((frag-vec2(.075,.91))*vec2(resolution.x/resolution.y,1.));
  col=mix(col,vec3(1.,.12,.08),smoothstep(.011,.007,rd)*step(.5,fract(t*.9)));

  gl_FragColor=vec4(col,1.);
}
</script>

<script>
'use strict';
// ---------- gl setup ----------
const cv=document.getElementById('cv');
const gl=cv.getContext('webgl',{antialias:false,preserveDrawingBuffer:false});
const VS='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

// spectrum texture: 512 wide, row 0 = fft, row 1 = waveform
const specTex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,specTex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.LUMINANCE,512,2,0,gl.LUMINANCE,gl.UNSIGNED_BYTE,
  new Uint8Array(512*2));
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

let prog=null,locs={};
function compileShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    const e=gl.getShaderInfoLog(s);gl.deleteShader(s);throw e;
  }
  return s;
}
function build(fsSrc){
  const vs=compileShader(gl.VERTEX_SHADER,VS);
  const fs=compileShader(gl.FRAGMENT_SHADER,fsSrc);
  const p=gl.createProgram();
  gl.attachShader(p,vs);gl.attachShader(p,fs);
  gl.bindAttribLocation(p,0,'p');
  gl.linkProgram(p);
  gl.deleteShader(vs);gl.deleteShader(fs);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){
    const e=gl.getProgramInfoLog(p);gl.deleteProgram(p);throw e;
  }
  return p;
}
const code=document.getElementById('code');
const log=document.getElementById('log');
let editor=null;
function getCode(){return editor?editor.getValue():code.value;}
function recompile(){
  try{
    const p=build(getCode());
    if(prog)gl.deleteProgram(prog);
    prog=p;
    locs={};
    for(const n of['time','resolution','sound','bass','mid','treb','quality','spectrum'])
      locs[n]=gl.getUniformLocation(prog,n);
    log.textContent='✓ compiled '+new Date().toLocaleTimeString();
    log.className='ok';
  }catch(e){
    log.textContent=String(e);
    log.className='bad';
  }
}
code.value=document.getElementById('fs').textContent.trim();
recompile();

// editor niceties
let timer=null;
code.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(recompile,800);});
code.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();recompile();}
  if(e.key==='Tab'){
    e.preventDefault();
    const s=code.selectionStart;
    code.setRangeText('  ',s,code.selectionEnd,'end');
  }
});
document.getElementById('recompile').onclick=recompile;
document.getElementById('toggle').onclick=function(){
  const left=document.getElementById('left');
  left.classList.toggle('hidden');
  const hidden=left.classList.contains('hidden');
  this.classList.toggle('on',!hidden);
  if(!hidden&&editor)setTimeout(()=>editor.refresh(),0);
};
// syntax highlighting if the CDN loaded (plain textarea otherwise)
if(window.CodeMirror){
  editor=CodeMirror.fromTextArea(code,{
    mode:'text/x-csrc',theme:'material-darker',lineNumbers:true,
    indentUnit:2,tabSize:2,
    extraKeys:{'Ctrl-Enter':recompile,'Cmd-Enter':recompile}
  });
  editor.on('change',()=>{clearTimeout(timer);timer=setTimeout(recompile,800);});
}

// ---------- audio ----------
let actx=null,analyser=null,freq=null,wave=null,srcNode=null;
const DEFAULT_TRACK='canada.mp3';  // bundled track, loops in the background
// on iOS we skip the WebAudio analyser: routing the <audio> element through
// an AudioContext kills playback when the phone locks. a plain element keeps
// playing in the background, at the cost of audio-reactive visuals on iOS.
const isiOS=/iP(hone|ad|od)/.test(navigator.userAgent)
  ||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
const audio=new Audio();
audio.loop=true;
let levels={sound:0,bass:0,mid:0,treb:0};
let userMuted=false;
const fileIn=document.getElementById('file');
const muteBtn=document.getElementById('mute');
const trackEl=document.getElementById('track');
const ICON_ON='<svg width="16" height="16" viewBox="0 0 16 16">'+
  '<path d="M2 6h2.6L9 2.8v10.4L4.6 10H2z" fill="currentColor"/>'+
  '<path d="M11 5.2a4 4 0 0 1 0 5.6M12.8 3.4a6.5 6.5 0 0 1 0 9.2" fill="none"'+
  ' stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';
const ICON_OFF='<svg width="16" height="16" viewBox="0 0 16 16">'+
  '<path d="M2 6h2.6L9 2.8v10.4L4.6 10H2z" fill="currentColor"/>'+
  '<path d="M11 6.2l3.6 3.6M14.6 6.2L11 9.8" fill="none"'+
  ' stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';
function updateMuteLabel(){muteBtn.innerHTML=audio.muted?ICON_OFF:ICON_ON;}
// the analyser graph can only start after the first user gesture
// (and routing the element through a suspended context would silence it,
//  so we build the graph lazily inside the gesture)
function firstGesture(e){
  if(!started){
    started=true;
    startTime=performance.now();
    document.body.classList.add('started');
    trackEl.textContent=trackEl.textContent.replace(/ — press play/,'');
  }
  if(!actx&&!isiOS){
    actx=new (window.AudioContext||window.webkitAudioContext)();
    srcNode=actx.createMediaElementSource(audio);
    analyser=actx.createAnalyser();
    analyser.fftSize=1024;
    analyser.smoothingTimeConstant=.7;
    srcNode.connect(analyser);
    analyser.connect(actx.destination);
    freq=new Uint8Array(analyser.frequencyBinCount);   // 512
    wave=new Uint8Array(512);
  }
  const resumed=actx?actx.resume():null;
  // the mute button manages itself — don't auto-unmute under its click
  if(e&&e.target&&muteBtn.contains(e.target)){updateMuteLabel();return;}
  if(audio.muted&&!userMuted){
    audio.muted=false;  // lift the autoplay fallback mute
    trackEl.textContent=trackEl.textContent.replace(/ — muted.*/,'');
  }
  const tryPlay=()=>{if(audio.paused&&audio.src)audio.play().catch(()=>{});};
  tryPlay();
  if(resumed&&resumed.then)resumed.then(tryPlay,tryPlay);
  updateMuteLabel();
}
// pointerdown alone isn't enough on mobile: iOS only unlocks audio from
// touchend/click gestures, so listen to all of them (handler is idempotent)
window.addEventListener('pointerdown',firstGesture);
window.addEventListener('touchend',firstGesture);
window.addEventListener('click',firstGesture);
window.addEventListener('keydown',firstGesture);
muteBtn.onclick=()=>{
  const m=!audio.muted;          // toggle whatever the real state is
  audio.muted=m;
  userMuted=m;
  if(!m){
    trackEl.textContent=trackEl.textContent.replace(/ — muted.*/,'');
    if(audio.paused&&audio.src)audio.play().catch(()=>{});
  }
  updateMuteLabel();
};
fileIn.onchange=()=>{
  const f=fileIn.files[0];
  if(!f)return;
  audio.src=URL.createObjectURL(f);
  trackEl.textContent=f.name;
  audio.play().catch(()=>{});
};
audio.addEventListener('error',()=>{
  trackEl.textContent='no '+DEFAULT_TRACK+' — use Load MP3';
});
// load the bundled track; visuals and music both start on the first click
audio.src=DEFAULT_TRACK;
trackEl.textContent=DEFAULT_TRACK+' — press play';
updateMuteLabel();
// lock screen metadata + controls so background playback behaves like media
if('mediaSession' in navigator){
  navigator.mediaSession.metadata=new MediaMetadata({
    title:'ካናዳ',artist:'kitfo capital'});
  navigator.mediaSession.setActionHandler('play',()=>audio.play());
  navigator.mediaSession.setActionHandler('pause',()=>audio.pause());
}
function band(lo,hi){ // average of freq bins in [lo,hi) Hz, 0..1
  const hzPerBin=actx.sampleRate/analyser.fftSize;
  let a=Math.max(1,Math.floor(lo/hzPerBin)),b=Math.min(freq.length,Math.ceil(hi/hzPerBin));
  let s=0;for(let i=a;i<b;i++)s+=freq[i];
  return s/Math.max(1,b-a)/255;
}
const specData=new Uint8Array(512*2);
function updateAudio(){
  if(!analyser||audio.paused){
    for(const k in levels)levels[k]*=.94; // decay to zero when silent
    return;
  }
  analyser.getByteFrequencyData(freq);
  analyser.getByteTimeDomainData(wave);
  const tgt={
    bass:Math.min(1,Math.pow(band(40,250)*1.25,1.6)),
    mid:Math.min(1,band(250,2000)*1.3),
    treb:Math.min(1,band(2000,8000)*1.6),
    sound:Math.min(1,band(40,8000)*1.3)
  };
  for(const k in tgt)levels[k]+= (tgt[k]-levels[k])*.35;
  specData.set(freq.subarray(0,512),0);
  specData.set(wave.subarray(0,512),512);
  gl.bindTexture(gl.TEXTURE_2D,specTex);
  gl.texSubImage2D(gl.TEXTURE_2D,0,0,0,512,2,gl.LUMINANCE,gl.UNSIGNED_BYTE,specData);
}
const mB=document.querySelector('#mB i'),mM=document.querySelector('#mM i'),
      mT=document.querySelector('#mT i');

// ---------- render loop ----------
// phones can't afford full retina + the 3-tap aberration: render smaller
// (the VHS grain hides it) and adapt the scale to sustained frame times,
// so the GPU never starves the audio thread
const isMobile=isiOS||/Android/i.test(navigator.userAgent);
const baseScale=isMobile?.6:1;
let resScale=baseScale,ema=16,lastT=performance.now(),fcount=0;
let started=false,startTime=performance.now();
function frame(){
  requestAnimationFrame(frame);
  const now=performance.now();
  ema=ema*.95+(now-lastT)*.05;lastT=now;
  if(++fcount%180===0){
    if(ema>30&&resScale>.40)resScale*=.85;
    else if(ema<17&&resScale<baseScale)resScale=Math.min(baseScale,resScale*1.12);
  }
  const dpr=Math.min(window.devicePixelRatio||1,isMobile?1:1.5)*resScale;
  const w=cv.clientWidth*dpr|0,h=cv.clientHeight*dpr|0;
  if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;gl.viewport(0,0,w,h);}
  updateAudio();
  mB.style.width=(levels.bass*100)+'%';
  mM.style.width=(levels.mid*100)+'%';
  mT.style.width=(levels.treb*100)+'%';
  if(!prog)return;
  gl.useProgram(prog);
  const t=started?(performance.now()-startTime)/1000:0.;
  if(locs.time)gl.uniform1f(locs.time,t);
  if(locs.resolution)gl.uniform2f(locs.resolution,w,h);
  if(locs.sound)gl.uniform1f(locs.sound,levels.sound);
  if(locs.bass)gl.uniform1f(locs.bass,levels.bass);
  if(locs.mid)gl.uniform1f(locs.mid,levels.mid);
  if(locs.treb)gl.uniform1f(locs.treb,levels.treb);
  if(locs.quality)gl.uniform1f(locs.quality,isMobile?0:1);
  if(locs.spectrum){
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D,specTex);
    gl.uniform1i(locs.spectrum,0);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}
frame();
</script>
</body>
